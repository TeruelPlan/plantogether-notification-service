server:
  port: 8087

spring:
  application:
    name: plantogether-notification-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}

grpc:
  trip-service:
    host: ${TRIP_SERVICE_GRPC_HOST:localhost}
    port: ${TRIP_SERVICE_GRPC_PORT:9081}

websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:*}

rabbitmq:
  queues:
    expense-created: q.expense.created
    trip-event: q.trip.event
    notification-push: q.notification.push

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
